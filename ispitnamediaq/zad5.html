<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 5</title>

    <style>
    
    body{
        margin: 0;
    }
    .Kartica1{
        background-color: lightcoral;
    }
    .Kartica2{
        background-color: lightblue;
    }
    .Kartica3{
        background-color: lightgreen;
    }
    .Kartica4{
        background-color: lightseagreen;
    }
    .Kartica5{
        background-color: lightgoldenrodyellow;
    }
    .Kartica6{
        background-color: lightgray;
    }
    div{
        text-align: center;
        width: 100%;
        height: 100%;
    }
    .container{
        background-color: rgb(255, 255, 255);
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(4,1fr);
        grid-template-rows: 1fr 1fr;
        gap: 5px;
    }
    .Kartica1{
        grid-column: 1/4;
    }
    @media(max-width: 768px){
        .container{
            grid-template-columns: 1fr;
            grid-template-rows: 1.5fr repeat(5,1fr);
        }
        .Kartica1{
            grid-column: 1/2;
            grid-row: 1/2;
        }
        .Kartica2{
            grid-column: 1/2;
            grid-row: 2/3;
        }
        .Kartica3{
            grid-column: 1/2;
            grid-row: 3/4;
        }
        .Kartica4{
            grid-column: 1/2;
            grid-row: 4/5;
        }
        .Kartica5{
            grid-column: 1/2;
            grid-row: 5/6;
        }
        .Kartica6{
            grid-column: 1/2;
            grid-row: 6/7;
        }
    }

    

    </style>
</head>
<body>
    <div class="container">
        <div class="Kartica1">Kartica 1</div>
        <div class="Kartica2">Kartica 2</div>
        <div class="Kartica3">Kartica 3</div>
        <div class="Kartica4">Kartica 4</div>
        <div class="Kartica5">Kartica 5</div>
        <div class="Kartica6">Kartica 6</div>
    </div>
    
</body>
</html>
