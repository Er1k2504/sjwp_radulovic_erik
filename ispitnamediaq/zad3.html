<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 3</title>
<style>
    body{
        margin: 0px;
    }

    .container{
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 5px;
        width: 100vw;
        height: 100vh;
    }

    .sl1{background-color: rgb(255, 0, 0);}
    .sl2{background-color: rgb(255, 123, 0);}
    .sl3{background-color: rgb(255, 217, 0);}
    .sl4{background-color: rgb(0, 255, 0);}
    .sl5{background-color: darkgreen;}
    .sl6{background-color: blue}
    .sl7{background-color: darkblue;}
    .sl8{background-color: indigo;}
    .sl9{background-color: purple}
    .sl10{background-color: whitesmoke;}
    .sl11{background-color: gray;}
    .sl12{background-color: black;} 

    @media (max-width: 1023px){
        .container{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, 1fr);
        }

    }
    @media(max-width: 768px){
        .container{
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            grid-template-rows: repeat(12, 1fr);
        }
    }

</style>



</head>
<body>
    <div class="container">
        <div class="sl1"></div>
        <div class="sl2"></div>
        <div class="sl3"></div>
        <div class="sl4"></div>
        <div class="sl5"></div>
        <div class="sl6"></div>
        <div class="sl7"></div>
        <div class="sl8"></div>
        <div class="sl9"></div>
        <div class="sl10"></div>
        <div class="sl11"></div>
        <div class="sl12"></div>
    </div>
</body>
</html>
