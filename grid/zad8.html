<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sud{
  display:grid;
  grid-template-columns: repeat(6,70px);
  gap:15px;
  width:max-content;
  margin-top:40px;
}

.sud div{
  padding:20px;
  text-align:center;
  font-family:Arial;
  border-radius:4px;
}

.sud div:nth-child(odd){
  background:#444;
  color:white;
}

.sud div:nth-child(even){
  background:#d0d0d0;
}
    </style>
</head>
<body>
  <div class="sud">
  <div class="a">1</div>
  <div class="b">2</div>
  <div class="c">3</div>
  <div class="d">4</div>
  <div class="e">5</div>
  <div class="f">6</div>
  <div>7</div>
  <div>8</div>
  <div>9</div>
  <div>10</div>
  <div>11</div>
  <div>12</div>
</div>
    
</body>
</html>
