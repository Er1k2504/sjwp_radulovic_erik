<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sud{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 90px 90px 90px;

    gap:10px;
    padding:10px;
    border:2px solid #bbb;

    width:400px;
}

.sud div{
    background:#444;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

.e{
    grid-column:1 / 3;
}
    </style>
</head>
<body>
    <div class="sud">
    <div class="a">A</div>
    <div class="b">B</div>
    <div class="c">C</div>
    <div class="d">D</div>
    <div class="e">E</div>
</div>
    
</body>
</html>
